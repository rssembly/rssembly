version: "2"

linters:
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gofmt
    - misspell
    - prealloc
    - gocritic
    - godox
    - bodyclose
    - noctx
  settings:
    revive:
      rules:
        - name: exported
          severity: warning
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-naming
        - name: error-strings
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
    gofmt:
      simplify: true
    gocritic:
      enabled-tags:
        - performance
        - style
        - diagnostic

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - noctx

output:
  formats:
    - format: colored-line-number
      path: stdout